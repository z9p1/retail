server:
  port: 8080

spring:
  application:
    name: retail-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/retail?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT
jwt:
  secret: retail-single-store-jwt-secret-key-32bytes
  expiration-ms: 86400000

# 用户分析/流量监控缓存 5 分钟
cache:
  user-analysis-ttl: 300
  traffic-ttl: 300

# 店家侧智能助手（API Key 存数据库 agent_config 表，config_key=agent_api_key）
# provider: openai = 调用 OpenAI 兼容的 chat/completions + 本后端执行工具；dify = 调用 Dify chat-messages，工具在 Dify 工作流中配置
agent:
  provider: openai
  api-url: https://hnd1.aihub.zeabur.ai/v1
  model: gpt-4o-mini
  # Dify 模式：api-url 填 Dify 应用 Base URL，agent_api_key 填 Dify 应用 API Key（见 docs/DIFY_INTEGRATION.md）
  embedding-model: text-embedding-ada-002
  conversation-max-messages: 20
  context-cache-ttl-seconds: 120
  dify-timeout-seconds: 60
  # 流式调用 Dify 的读超时（秒）
  dify-stream-timeout-seconds: 120

# RAG 检索：每条问题取最相关的 topK 条知识块注入助手上下文
rag:
  retrieve-top-k: 5
